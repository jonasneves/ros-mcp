name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build webmcp
        run: |
          cd dashboard
          npm ci
          node build.mjs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist

      - id: deploy
        uses: actions/deploy-pages@v4