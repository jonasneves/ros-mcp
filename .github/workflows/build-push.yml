name: Build

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - 'src/ros_mcp/**'
      - 'server.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/build-push.yml'
  workflow_dispatch:
    inputs:
      images:
        description: 'Images to build: comma-separated (turtlesim,ros-mcp) or "all"'
        required: false
        default: 'all'
        type: string
      no_cache:
        description: 'Build without cache'
        required: false
        default: false
        type: boolean

env:
  IMAGE_BASE: ghcr.io/${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:

  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: turtlesim
            dockerfile: docker/Dockerfile.turtlesim
            context: docker
            runner: ubuntu-24.04-arm
            platforms: linux/amd64,linux/arm64
          - name: ros-mcp
            dockerfile: docker/Dockerfile.mcp
            context: .
            runner: ubuntu-24.04-arm
            platforms: linux/amd64,linux/arm64

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image should be built
        id: check
        run: |
          IMAGES="${{ inputs.images || 'all' }}"
          if [ "$IMAGES" = "all" ] || echo ",$IMAGES," | grep -q ",${{ matrix.name }},"; then
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "build=false" >> $GITHUB_OUTPUT
          fi

      - name: Compute cache scope
        id: cache
        if: steps.check.outputs.build == 'true'
        run: |
          HASH=$(sha256sum ${{ matrix.dockerfile }} | cut -c1-8)
          echo "scope=${{ matrix.name }}-${HASH}" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        if: steps.check.outputs.build == 'true'
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ env.IMAGE_BASE }}/${{ matrix.name }}:latest
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha,scope=${{ steps.cache.outputs.scope }}
          cache-to: type=gha,scope=${{ steps.cache.outputs.scope }},mode=max
          no-cache: ${{ inputs.no_cache || false }}
